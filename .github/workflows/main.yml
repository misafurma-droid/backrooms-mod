name: Build Backrooms Fabric Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 7.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6'

      - name: Build
        run: gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backrooms-mod-fabric
          path: build/libs/backrooms-mod-1.0.0.jar
